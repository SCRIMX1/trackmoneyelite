<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Track Money Final</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
:root{--bg:#07110d;--bg2:#0b1812;--card:#101f18;--line:#1a3427;--txt:#eef7f1;--muted:#8aa393;--green:#22d36f}
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,-apple-system,sans-serif}
body{background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--txt)}
.wrap{max-width:430px;margin:auto;min-height:100vh;padding:18px 16px 95px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.brand{font-size:28px;font-weight:800}.elite{color:var(--green)}
select,input,button{width:100%;padding:14px;border-radius:16px;border:none}
select,input{background:#0d1a14;color:#fff;border:1px solid var(--line)}
.hero{background:linear-gradient(135deg,#1dbd63,#0e7f44);padding:22px;border-radius:24px;animation:up .5s}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.bal{font-size:38px;font-weight:800;margin-top:6px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.card{background:var(--card);border:1px solid var(--line);padding:15px;border-radius:20px}
.page{display:none}.page.active{display:block}
.muted{font-size:12px;color:var(--muted)}
.value{font-size:22px;font-weight:700;margin-top:6px}
.sec{margin-top:16px}
.item{display:flex;justify-content:space-between;gap:10px;padding:12px;background:var(--card);border:1px solid var(--line);border-radius:16px;margin:8px 0}
.actions button{width:auto;padding:6px 10px;border-radius:10px;font-size:12px}
.btn{background:linear-gradient(135deg,#22d36f,#129953);color:#04170c;font-weight:800}
.nav{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);max-width:430px;width:calc(100% - 24px);display:flex;justify-content:space-around;background:#09150f;border:1px solid var(--line);padding:10px;border-radius:24px}
.nav button{background:none;color:#fff;width:auto;padding:8px 10px;font-size:12px}
canvas{width:100%;background:#0c1712;border-radius:18px;margin-top:10px}
</style></head><body><div class="wrap">
<div class="top"><div class="brand">Track Money <span class="elite">Elite</span></div>
<select id="wallet" style="width:120px" onchange="render()"><option value="NTD">NTD</option><option value="IDR">IDR</option></select></div>

<div id="home" class="page active">
<div class="hero"><div class="muted">Total Saldo</div><div id="bal" class="bal">0</div></div>
<div class="grid">
<div class="card"><div class="muted">Income</div><div id="inc" class="value">0</div></div>
<div class="card"><div class="muted">Expense</div><div id="exp" class="value">0</div></div>
</div>
<div class="sec card">
<div class="muted">Tambah Transaksi</div><br>
<select id="type"><option value="income">Pemasukan</option><option value="expense">Pengeluaran</option></select><br><br>
<input id="desc" placeholder="Keterangan"><br><br>
<input id="amt" type="number" placeholder="Jumlah"><br><br>
<button class="btn" onclick="addTx()">Simpan</button>
</div></div>

<div id="stats" class="page"><div class="card"><div class="muted">Rekap Bulanan</div><canvas id="cv" width="360" height="180"></canvas></div></div>
<div id="history" class="page"><div id="list"></div></div>
<div id="settings" class="page"><div class="card"><button class="btn" onclick="backup()">Backup JSON</button><br><br><button class="btn" onclick="resetWallet()">Reset Wallet</button></div></div>
</div>

<div class="nav">
<button onclick="showp('home')">Home</button>
<button onclick="showp('stats')">Stats</button>
<button onclick="showp('history')">History</button>
<button onclick="showp('settings')">Settings</button>
</div>

<script>
let db=JSON.parse(localStorage.getItem('tm_final')||'{"NTD":[],"IDR":[]}');
const $=id=>document.getElementById(id);
function cur(){return $('wallet').value}
function sym(){return cur()==='NTD'?'NT$':'Rp'}
function money(n){return sym()+' '+Number(n).toLocaleString('en-US')}
function save(){localStorage.setItem('tm_final',JSON.stringify(db));render()}
function showp(id){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));$(id).classList.add('active');render()}
function addTx(){let d=$('desc').value.trim(),a=parseFloat($('amt').value),t=$('type').value;if(!d||!a)return;
db[cur()].unshift({id:Date.now(),desc:d,amt:a,type:t,date:new Date().toLocaleDateString()});$('desc').value='';$('amt').value='';save();}
function delTx(id){db[cur()]=db[cur()].filter(x=>x.id!==id);save()}
function editTx(id){let t=db[cur()].find(x=>x.id===id);if(!t)return;let d=prompt('Keterangan',t.desc);if(d===null)return;let a=prompt('Jumlah',t.amt);if(a===null)return;t.desc=d;t.amt=parseFloat(a)||t.amt;save();}
function backup(){let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='trackmoney-backup.json';a.click();}
function resetWallet(){if(confirm('Reset wallet ini?')){db[cur()]=[];save();}}
function chart(arr){let c=$('cv'),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);let vals=[0,0,0,0,0,0];arr.slice(0,6).forEach((v,i)=>vals[i]=v.amt);let m=Math.max(...vals,1);vals.forEach((v,i)=>{let h=v/m*120;x.fillStyle='#22d36f';x.fillRect(20+i*55,150-h,26,h);});}
function render(){let arr=db[cur()],inc=0,exp=0,h='';arr.forEach(v=>{if(v.type==='income')inc+=v.amt;else exp+=v.amt;
h+=`<div class=item><div><div>${v.desc}</div><div class=muted>${v.date}</div></div><div><div>${v.type==='income'?'+':'-'} ${money(v.amt)}</div><div class=actions><button onclick="editTx(${v.id})">Edit</button> <button onclick="delTx(${v.id})">Del</button></div></div></div>`});
$('inc').textContent=money(inc);$('exp').textContent=money(exp);$('bal').textContent=money(inc-exp);$('list').innerHTML=h||'<div class="card">Belum ada transaksi</div>';chart(arr);}
render();
</script></body></html>
